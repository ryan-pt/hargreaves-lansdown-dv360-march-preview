<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Document</title>
<style>
#main {
    font-family: arial;
    font-size: 16px;
    width: 800px;
    margin: 2em auto;
}

#main a {
    padding: 5px 0;
    display: inline-block;
}
</style>
</head>
<body>
<div id="main"></div>
<script>
const data = {
    'ads': ['ISA','Cash ISA', 'SIPP'],
    'sizes': ['160x600','300x250','300x600','728x90','970x250']
}
const main = document.querySelector('#main');
for (const ad of data.ads) {
    main.insertAdjacentHTML('beforeend',`<h2>${ad}</h2>`);
    for (const size of data.sizes) {
        main.insertAdjacentHTML('beforeend',`<a href="./${ad.toLowerCase().replace(' ','-')}-${size}.html" target="_blank">${ad} ${size}</a><br>`);
    }
}
</script>
</body>
</html>
